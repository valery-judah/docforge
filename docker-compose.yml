services:
  api:
    build:
      context: .
      args:
        DOC_FORGE_UV_SYNC_GROUPS: ${DOC_FORGE_UV_SYNC_GROUPS:-}
    init: true
    user: "${DOC_FORGE_UID:-1000}:${DOC_FORGE_GID:-1000}"
    environment:
      DOC_FORGE_ARTIFACT_ROOT: /artifacts
      DOC_FORGE_EMBEDDING_MODEL: ${DOC_FORGE_EMBEDDING_MODEL:-deterministic}
      DOC_FORGE_SERVICE_NAME: doc_forge-api
      DOC_FORGE_JSON_LOG_PATH: /logs/compose/runs/${DOC_FORGE_LOG_RUN_ID:-manual}/api.jsonl
      DOC_FORGE_HF_HOME: ${DOC_FORGE_HF_HOME:-/artifacts/huggingface}
      DOC_FORGE_HF_HUB_OFFLINE: ${DOC_FORGE_HF_HUB_OFFLINE:-0}
      DOC_FORGE_TORCHINDUCTOR_CACHE_DIR: ${DOC_FORGE_TORCHINDUCTOR_CACHE_DIR:-/artifacts/torchinductor-cache}
      DOC_FORGE_TRANSFORMERS_OFFLINE: ${DOC_FORGE_TRANSFORMERS_OFFLINE:-0}
      HOME: /tmp
      PORT: "8000"
      TORCH_COMPILE_DISABLE: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/artifacts
      - ./data/logs:/logs
    ports:
      - "${PORT:-8000}:8000"
    networks:
      default:
        aliases:
          - docforge-api
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=2).status == 200 else 1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped
