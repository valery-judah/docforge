[tasks.fmt]
help = "Format and auto-fix lint issues"
sequence = [
    { cmd = "ruff format ." },
    { cmd = "ruff check . --fix" }
]

[tasks.fmt-check]
help = "Check formatting without modifying files"
cmd = "ruff format . --check"

[tasks.lint]
help = "Run lint checks"
cmd = "ruff check ."

[tasks.type]
help = "Run static type checks"
cmd = "pyright"

[tasks.test]
help = "Run unit tests"
cmd = "pytest tests"

[tasks.verify]
help = "Run the read-only verification suite"
sequence = ["fmt-check", "lint", "type", "test"]

[tasks.clean]
help = "Remove generated local state while preserving durable repo inputs"
cmd = "python -m doc_forge.devtools.repo_clean"

[tasks.check]
help = "Alias for the read-only verification suite"
sequence = ["verify"]

[tasks.secret-scan]
help = "Scan tracked repository files for leaked keys"
cmd = "python -m doc_forge.devtools.secret_scan --scope repo"

[tasks.secret-scan-staged]
help = "Scan staged added lines for leaked keys"
cmd = "python -m doc_forge.devtools.secret_scan --scope staged-added"

[tasks.run-api]
help = "Run the internal lifecycle FastAPI app"
cmd = "uvicorn doc_forge.app.api:app --reload"

[tasks.run-worker]
help = "Run the internal lifecycle worker loop"
cmd = "python -m doc_forge.lifecycle.worker"

[tasks.migrate]
help = "Apply Alembic migrations using DATABASE_URL"
cmd = "alembic -c alembic.ini upgrade head"

[tasks.db-revision]
help = "Create a new Alembic revision with MESSAGE='...'"
cmd = "alembic -c alembic.ini revision -m '${message}'"
args = [{name = "message", positional = true, required = true}]
